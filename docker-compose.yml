version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: affiliate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: affiliate_user
      POSTGRES_PASSWORD: affiliate_pass_2024
      POSTGRES_DB: affiliate_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "8020:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affiliate_user -d affiliate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: affiliate_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@affiliate.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8021:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
